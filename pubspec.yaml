name: roofgrid_uk
description: RoofGrid UK Precision Roofing Calculations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_auth: ^6.5.4
  firebase_app_check: ^0.4.5
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  file_picker: ^11.0.2
  google_sign_in: ^6.2.1
  flutter_riverpod: 3.3.2
  go_router: 17.0.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.3.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  share_plus: ^12.0.2
  screenshot: ^3.0.0
  url_launcher: ^6.3.2
  app_links: ^6.4.1
  flutter_secure_storage: ^10.3.1
  webview_flutter: ^4.13.0
  http: ^1.6.0
  cloud_functions: ^6.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  flutter_stripe: ^11.5.0
  fl_chart: ^1.1.0
  csv: ^6.0.0
  syncfusion_flutter_charts: ^31.0.0
  pdf: ^3.11.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.4
  hive_generator: ^2.0.1
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/images/tiles/
    - assets/images/toggle_on.png
    - assets/images/toggle_off.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700